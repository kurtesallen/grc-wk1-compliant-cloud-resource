name: grc-gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  grc-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Install Conftest (PINNED VERSION — DO NOT USE "latest")
      # ------------------------------------------------------------
      - name: Install Conftest
        run: |
          curl -L \
            https://github.com/open-policy-agent/conftest/releases/download/v0.52.0/conftest_0.52.0_Linux_x86_64.tar.gz \
            -o conftest.tar.gz
          tar -xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/
          conftest --version

      # ------------------------------------------------------------
      # Run the three policy namespaces against the committed plan.json
      # Write results to evidence/conftest-results.json
      # ------------------------------------------------------------
      - name: Run policy gate
        run: |
          mkdir -p evidence

          # Run Conftest against the Terraform plan evidence
          conftest test week1/evidence/plan.json \
            --policy week2/policies \
            --output json \
            > evidence/conftest-results.json
      - name: Debug working directory
        run: |
          pwd
          ls -R .

      # ------------------------------------------------------------
      # Fail the job if any policy namespace reports a failure
      # ------------------------------------------------------------
      - name: Fail if policies fail
        run: |
          if grep -q '"fail"' evidence/conftest-results.json; then
            echo "❌ Policy gate failed — see evidence/conftest-results.json"
            exit 1
          else
            echo "✅ All policy namespaces passed"
          fi

      # ------------------------------------------------------------
      # Upload evidence even when the gate fails
      # This is REQUIRED for compliance pipelines
      # ------------------------------------------------------------
      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grc-evidence
          path: evidence/

